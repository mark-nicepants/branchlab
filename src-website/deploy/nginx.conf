# Serves the static one-pager. TLS/compression-negotiation quirks live in
# nginx-proxy-manager in front of this; keep this config minimal.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Screenshots/icons are content-hashed by redeploys rarely — cache hard;
    # a new deploy replaces the whole container anyway.
    location /assets/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}
