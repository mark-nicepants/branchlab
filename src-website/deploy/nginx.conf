# Serves the static one-pager. TLS/compression-negotiation quirks live in
# nginx-proxy-manager in front of this; keep this config minimal.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Screenshots/icons are content-hashed by redeploys rarely — cache hard;
    # a new deploy replaces the whole container anyway.
    location /assets/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Release artifacts (bind-mounted from the host at deploy time, so they
    # survive site redeploys). The updater polls latest.json — never cache it;
    # the versioned DMG/tarball files are immutable.
    location = /releases/latest.json {
        add_header Cache-Control "no-cache";
    }
    # Stable "latest DMG" name the website's Download button links to —
    # overwritten by each release, so only a short cache.
    location = /releases/BranchLab_latest_universal.dmg {
        add_header Cache-Control "public, max-age=3600";
    }
    location /releases/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }
}
