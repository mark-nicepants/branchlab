name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Vite 8 / Vitest 4 require Node 20.19+ / 22.12+.
  NODE_VERSION: "22"

jobs:
  frontend:
    name: Frontend (typecheck, build, tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` is `tsc && vite build`: the tsc step type-checks under
      # strict mode (noUnusedLocals/Parameters), which is our frontend lint gate.
      - name: Type-check & build
        run: npm run build

      - name: Unit tests
        run: npm test

  rust:
    name: Rust (fmt, clippy, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # System libraries Tauri needs to compile on Linux.
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Formatting (rustfmt)
        run: cargo fmt --all --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib

  audit-npm:
    name: Security audit (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail the build on a known high/critical advisory in npm dependencies.
      - name: npm audit
        run: npm audit --audit-level=high

  audit-cargo:
    name: Security audit (cargo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Scans Cargo.lock against the RustSec advisory DB. Fails on actual
      # vulnerabilities; unmaintained/unsound warnings (mostly transitive Tauri
      # GTK bindings) are reported but do not fail the build.
      - name: cargo audit
        run: cargo audit
        working-directory: src-tauri
